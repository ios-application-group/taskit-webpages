<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rate TaskIt</title>
  <style>
    :root {
      --bg-color: #f4f4f4; --card-bg: #fff; --accent: #3b82f6;
      --text-color: #1f2937; --subtle-text: #6b7280; --border-color: #e5e7eb;
    }
    body {
      margin: 0; padding: 1rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg-color); color: var(--text-color);
    }
    .container { max-width: 600px; margin: 0 auto; text-align: center; padding-top: 3rem; }
    h1 { color: var(--text-color); margin-bottom: 0.5rem;}
    p { color: var(--subtle-text); margin-bottom: 2rem; }
    .stars { font-size: 3rem; color: #fbbf24; margin-bottom: 2rem; }
    .store-btn {
      display: inline-block; width: 80%; max-width: 300px;
      padding: 1rem; border-radius: 50px; color: #fff; font-weight: bold;
      text-decoration: none; margin-bottom: 1rem; transition: opacity 0.2s;
    }
    .store-btn:hover { opacity: 0.9; }
    .apple { background-color: #000; }
    .google { background-color: #10b981; }
  </style>
</head>
<body>
  <div class="container">
    <div class="stars">★★★★★</div>
    <h1>Enjoying TaskIt?</h1>
    <p>If you find this app helpful in organizing your life, taking a moment to rate us makes a huge difference!</p>
    
    <a href="https://apps.apple.com/app/idFAKEAPPSTOREID123" class="store-btn apple" target="_blank">
       Rate on App Store
    </a>
    
    <a href="https://play.google.com/store/apps/details?id=com.fakeplaystore.taskit" class="store-btn google" target="_blank">
      ▶ Rate on Play Store
    </a>
  </div>
</body>
</html>
